services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: owly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/owly?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth

volumes:
  postgres_data:
  whatsapp_auth:
